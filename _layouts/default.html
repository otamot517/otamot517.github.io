<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}

  <link rel="apple-touch-icon" sizes="57x57" href="{{ '/assets/favicons/apple-icon-57x57.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicons/apple-icon-180x180.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicons/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicons/favicon-16x16.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/favicons/manifest.json' | relative_url }}">
  <meta name="theme-color" content="#ffffff">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.css"/>

  <style>
    /* --- CSS 變數：淺色模式 (預設) --- */
    :root {
      --sidebar-width: 260px;
      --transition-speed: 0.3s;

      /* 側邊欄配色 */
      --sidebar-bg: #f8f9fa;
      --sidebar-text: #333333;
      --sidebar-link: #555555;
      --sidebar-link-hover: #000000;
      --sidebar-hover-bg: #e9ecef;
      
      /* 主要內容區配色 */
      --content-bg: #ffffff;
      --content-text: #333333;
      --border-color: #e0e0e0;
    }

    /* --- CSS 變數：深色模式 --- */
    body.dark-theme {
      /* 側邊欄配色 (深色) */
      --sidebar-bg: #181818;
      --sidebar-text: #e0e0e0;
      --sidebar-link: #aaaaaa;
      --sidebar-link-hover: #ffffff;
      --sidebar-hover-bg: #333333;

      /* 主要內容區配色 (深色) */
      --content-bg: #121212;
      --content-text: #e0e0e0;
      --border-color: #333333;
    }

    /* --- 基礎設定 --- */
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      overflow-x: hidden; 
      background: var(--content-bg); 
      color: var(--content-text); /* 讓文章文字跟隨模式切換 */
      transition: background var(--transition-speed), color var(--transition-speed);
    }

    /* 確保文章內的標題與段落也變色 */
    .wrapper h1, .wrapper h2, .wrapper h3, .wrapper h4, .wrapper p, .wrapper li {
      color: var(--content-text);
    }
    .wrapper a { color: #4b89dc; } /* 統一連結顏色，深淺色都適合 */

    /* --- 1. 頂部控制列 --- */
    .top-bar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: var(--content-bg);
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 50px;
      transition: background var(--transition-speed), border-color var(--transition-speed);
    }

    /* --- 2. 側邊欄樣式 --- */
    .sidebar-wrapper {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      color: var(--sidebar-text);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      transition: transform var(--transition-speed), background var(--transition-speed), border-color var(--transition-speed);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      border-right: 1px solid var(--border-color);
    }

    .collapsed .sidebar-wrapper { transform: translateX(-100%); }

    /* 側邊欄頭部 */
    .sidebar-header { padding: 20px; display: flex; align-items: center; gap: 15px; }
    .sidebar-header img, .sidebar-brand img, .sidebar-logo img {
      width: 40px !important; height: 40px !important; border-radius: 8px; object-fit: cover;
    }
    .sidebar-header a { color: var(--sidebar-text); text-decoration: none; font-weight: bold; font-size: 1.1rem; }

    /* 導航連結樣式 */
    .sidebar-nav a, .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 25px;
      color: var(--sidebar-link) !important; 
      text-decoration: none; transition: 0.2s; font-size: 0.95rem;
    }
    .sidebar-nav a:hover, .nav-item:hover {
      background-color: var(--sidebar-hover-bg); color: var(--sidebar-link-hover) !important;
      padding-left: 30px; border-radius: 0 8px 8px 0; margin-right: 10px;
    }

    /* 分類標籤 */
    .nav-label { font-size: 0.75rem; color: #888; padding: 15px 25px 5px; text-transform: uppercase; font-weight: 600; }

    /* --- 3. 內容區樣式 --- */
    .site-container { display: flex; transition: all var(--transition-speed); }
    .main-content { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; transition: margin var(--transition-speed); }
    .collapsed .main-content { margin-left: 0; }
    .wrapper { max-width: 850px !important; margin: 0 auto !important; padding: 40px 20px !important; }

    /* 按鈕樣式 */
    .toggle-btn, .icon-btn { background: none; border: none; cursor: pointer; font-size: 24px; padding: 5px; color: var(--content-text); transition: color 0.3s; }
    #sidebar-toggle-close { color: var(--sidebar-text); }
    
    /* 深淺色切換按鈕專屬樣式 */
    #theme-toggle { font-size: 20px; border-radius: 50%; padding: 5px 10px; }
    #theme-toggle:hover { background-color: var(--sidebar-hover-bg); }

    /* --- 4. Sakana Widget --- */
    #sakana-widget { position: fixed !important; right: 20px !important; bottom: 20px !important; z-index: 99999 !important; }
  </style>

  <body> 
    <div class="top-bar">
      <button id="sidebar-toggle-open" class="toggle-btn">☰</button>
      <span style="margin-left:10px; font-weight:bold;">{{ site.title }}</span>
      
      <div style="flex: 1;"></div> 
      
      <button id="theme-toggle" class="toggle-btn" title="切換深淺色模式">🌙</button>
    </div>

    <div class="site-container" id="site-wrapper">
      <aside class="sidebar-wrapper">
        {%- include sidebar.html -%}
      </aside>

      <main class="main-content">
        <div class="wrapper">
          {{ content }}
        </div>
        {%- include footer.html -%}
      </main>
    </div>

    <div id="sakana-widget"></div>

    <script src="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // --- 1. 深淺色模式切換邏輯 ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // 讀取使用者的歷史設定 (LocalStorage)
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
          body.classList.add('dark-theme');
          themeToggleBtn.textContent = '☀️'; // 變成太陽
        }

        // 點擊按鈕時切換
        themeToggleBtn.addEventListener('click', function() {
          body.classList.toggle('dark-theme');
          const isDark = body.classList.contains('dark-theme');
          
          // 切換圖示
          themeToggleBtn.textContent = isDark ? '☀️' : '🌙';
          
          // 儲存設定到瀏覽器
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // --- 2. 側邊欄收合邏輯 ---
        const wrapper = document.getElementById('site-wrapper');
        const btnOpen = document.getElementById('sidebar-toggle-open');
        const btnClose = document.getElementById('sidebar-toggle-close');

        function toggleSidebar() {
          wrapper.classList.toggle('collapsed');
        }

        if (btnOpen) btnOpen.onclick = toggleSidebar;
        if (btnClose) btnClose.onclick = toggleSidebar;

        // --- 3. Sakana Widget 初始化 ---
        new SakanaWidget({
          size: 200,
          autoFit: true,
        }).mount('#sakana-widget');
      });
    </script>
  </body>
</html>
